  /api/method/payments.utils.ivyliving_methods.handle_cart_submit:
    post:
      tags: [Common]
      summary: Handle Cart Submit (multi-gateway)
      description: |
        Submits a shopping cart for payment. Resolves the correct gateway
        (CCAvenue / Easebuzz / Razorpay / Cashfree) from `Payment Gateway Config`
        for the customer's company/hostel. Returns a `payment_url` and `gateway`.
      operationId: handle_cart_submit
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [requestObj]
              properties:
                requestObj:
                  type: string
                  description: JSON-encoded cart object
                  example: '{"cart":[{"itemCode":"ITEM-001","price":500}],"customer":"CUST-00001"}'
      responses:
        "200":
          description: Cart processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment_url:
                    type: string
                  gateway:
                    type: string
                    enum: [CCAvenue, Easebuzz, Razorpay, Cashfree]

  /api/method/payments.overrides.sales_invoice.get_payment_details:
    get:
      tags: [Common]
      summary: Get Payment Details for Sales Invoice
      description: Returns payment initiation data for a Sales Invoice. Used to pre-fill initiate_payment requests.
      operationId: get_payment_details
      parameters:
        - name: sales_invoice_name
          in: query
          required: true
          schema:
            type: string
          example: "SINV-0001"
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      data:
                        $ref: "#/components/schemas/InitiatePaymentRequest"
