openapi: 3.1.0

info:
  title: Ivy Living – Payment Gateway API
  version: 2.0.0
  description: |
    Multi-gateway payment API for the Ivy Living hostel management system.
    Supports CCAvenue, Easebuzz, Razorpay, and Cashfree with per-company/hostel routing.

    **Authentication:** Guest endpoints (`allow_guest=True`) require no auth.
    All other endpoints require an `Authorization: token <api_key>:<api_secret>` header
    or a valid Frappe session cookie.

    **Base URL pattern for all whitelisted methods:**
    ```
    https://{site}/api/method/payments.payment_gateways.doctype.{gateway}_settings.{gateway}_settings.{function_name}
    ```

servers:
  - url: https://{site}
    variables:
      site:
        default: yoursite.frappe.cloud
        description: ERPNext site hostname

tags:
  - name: Razorpay
    description: Razorpay multi-merchant payment endpoints
  - name: Easebuzz
    description: Easebuzz multi-merchant payment endpoints
  - name: CCAvenue
    description: CCAvenue multi-merchant payment endpoints
  - name: Cashfree
    description: Cashfree multi-instance payment endpoints
  - name: Common
    description: Multi-gateway and utility endpoints

# -----------------------------------------------------------------------
# COMPONENTS
# -----------------------------------------------------------------------
components:
  schemas:

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Missing required parameter: payer_email"

    # ------ Shared Initiate Request ------
    InitiatePaymentRequest:
      type: object
      required: [amount, reference_doctype, reference_docname, payer_email, payer_name]
      properties:
        amount:
          type: number
          description: Payment amount in major currency units (INR). Payment Charges are added server-side.
          example: 500.00
        reference_doctype:
          type: string
          example: "Sales Invoice"
        reference_docname:
          type: string
          example: "SINV-0001"
        payer_email:
          type: string
          format: email
          example: "student@example.com"
        payer_name:
          type: string
          description: Customer ID or display name
          example: "CUST-00001"
        currency:
          type: string
          default: "INR"
          example: "INR"
        company:
          type: string
          description: ERPNext Company name; drives merchant resolution
          example: "Hostel Koramangala Pvt Ltd"
        custom_merchant_name:
          type: string
          description: Explicit Merchant record name override
          example: "Hostel-Koramangala"
        description:
          type: string
          example: "Payment for Invoice SINV-0001"
        phone:
          type: string
          example: "9999999999"

    # ------ Shared Status Response ------
    PaymentStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
          enum: [Queued, Authorized, Completed, Failed]
          description: Integration Request status
        payment_status:
          type: string
          description: Raw gateway payment status string
        transaction_id:
          type: string
          description: Gateway transaction / payment ID
        bank_ref_no:
          type: string
          description: Bank reference number
        payment_mode:
          type: string
          description: Payment method used (Net Banking, UPI, Card, etc.)
        error_message:
          type: string
        reference_doctype:
          type: string
        reference_docname:
          type: string
        amount:
          type: number
        currency:
          type: string
        company:
          type: string
        merchant_name:
          type: string

    # ------ Razorpay ------
    RazorpayInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        payment_token:
          type: string
          description: Integration Request name
          example: "INT-00123"
        order_id:
          type: string
          description: Razorpay order ID – pass to Checkout.js
          example: "order_NxxxxxxxxxXXXXX"
        api_key:
          type: string
          description: Razorpay API key (public)
          example: "rzp_live_xxxxxxxxxxxxxxx"
        amount:
          type: integer
          description: Amount in paise (1 INR = 100 paise)
          example: 50000
        currency:
          type: string
          example: "INR"
        merchant_name:
          type: string
          example: "Hostel-Koramangala"
        company:
          type: string
          example: "Hostel Koramangala Pvt Ltd"
        environment:
          type: string
          enum: [Test, Production]
        prefill:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
            contact:
              type: string

    RazorpayVerifyRequest:
      type: object
      required: [razorpay_payment_id, razorpay_order_id, razorpay_signature, token]
      properties:
        razorpay_payment_id:
          type: string
          example: "pay_NxxxxxxxxxXXXXX"
        razorpay_order_id:
          type: string
          example: "order_NxxxxxxxxxXXXXX"
        razorpay_signature:
          type: string
          description: HMAC-SHA256 of `order_id|payment_id` with api_secret
          example: "abc123..."
        token:
          type: string
          description: payment_token from initiate_payment
          example: "INT-00123"

    RazorpayVerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
          enum: [Queued, Authorized, Completed, Failed]
        payment_id:
          type: string
        redirect_to:
          type: string
        reference_doctype:
          type: string
        reference_docname:
          type: string

    # ------ CCAvenue ------
    CCAvenueInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        payment_token:
          type: string
          description: Integration Request name
          example: "INT-00123"
        payment_url:
          type: string
          description: Full CCAvenue payment API URL
          example: "https://secure.ccavenue.com/transaction/transaction.do?command=initiateTransaction"
        encrypted_data:
          type: string
          description: AES-128-CBC encrypted payment payload
        access_code:
          type: string
          description: CCAvenue Access Code to include in form POST
        merchant_id:
          type: string
          description: CCAvenue Merchant ID
        merchant_name:
          type: string
          description: Resolved CCAvenue Merchant record name
        api_url:
          type: string
          description: Alias for payment_url
        iframe_url:
          type: string
          description: URL for embedding in an iframe
        company:
          type: string
        order_id:
          type: string

    # ------ Easebuzz ------
    EasebuzzInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        payment_token:
          type: string
          description: Integration Request name
          example: "INT-00123"
        payment_url:
          type: string
          description: Easebuzz hosted payment page URL
          example: "https://pay.easebuzz.in/pay/..."
        txnid:
          type: string
          description: Transaction ID (= Integration Request name)
          example: "INT-00123"
        merchant_name:
          type: string
          example: "Hostel-Koramangala"
        company:
          type: string
          example: "Hostel Koramangala Pvt Ltd"

    EasebuzzWebhookPayload:
      type: object
      properties:
        status:
          type: string
          enum: [success, failure, pending]
        txnid:
          type: string
        easepayid:
          type: string
        amount:
          type: string
        email:
          type: string
        firstname:
          type: string
        productinfo:
          type: string
        udf1:
          type: string
          description: reference_doctype
        udf2:
          type: string
          description: reference_docname
        udf3:
          type: string
          description: Integration Request name (token)
        udf4:
          type: string
          description: Frappe user
        udf5:
          type: string
          description: merchant_name
        hash:
          type: string
          description: SHA-512 reverse hash for verification
        bank_ref_num:
          type: string
        mode:
          type: string

    EasebuzzWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        transaction_id:
          type: string
        payment_status:
          type: string
        reference_doctype:
          type: string
        reference_docname:
          type: string
        redirect_to:
          type: string

    # ------ Cashfree ------
    CashfreeWebhookPayload:
      type: object
      properties:
        type:
          type: string
          enum: [PAYMENT_SUCCESS_WEBHOOK, PAYMENT_FAILED_WEBHOOK]
        data:
          type: object
          properties:
            order:
              type: object
              properties:
                order_id:
                  type: string
                order_status:
                  type: string
                  enum: [PAID, ACTIVE, EXPIRED]
                order_amount:
                  type: number
                order_currency:
                  type: string
            payment:
              type: object
              properties:
                cf_payment_id:
                  type: string
                payment_status:
                  type: string
                payment_amount:
                  type: number
                payment_method:
                  type: object
            customer_details:
              type: object

    # ------ Common ------
    CartSubmitRequest:
      type: object
      required: [cart, customer]
      properties:
        cart:
          type: array
          items:
            type: object
            required: [itemCode, price]
            properties:
              itemCode:
                type: string
              price:
                type: number
        customer:
          type: string
          description: ERPNext Customer ID

    CartSubmitResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        payment_url:
          type: string
          description: URL / token to initiate payment
        gateway:
          type: string
          enum: [CCAvenue, Easebuzz, Razorpay, Cashfree]
          description: Which gateway was selected for this customer's hostel

# -----------------------------------------------------------------------
# PATHS – RAZORPAY
# -----------------------------------------------------------------------
paths:

  /api/method/payments.payment_gateways.doctype.razorpay_settings.razorpay_settings.initiate_payment:
    post:
      tags: [Razorpay]
      summary: Initiate Razorpay Payment
      description: |
        Creates a Razorpay order server-side and returns credentials for the
        frontend to open the Checkout.js modal. Payment Charge surcharges are
        applied server-side before the order is created.
      operationId: razorpay_initiate_payment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "200":
          description: Payment initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/RazorpayInitiateResponse"

  /api/method/payments.payment_gateways.doctype.razorpay_settings.razorpay_settings.verify_payment:
    post:
      tags: [Razorpay]
      summary: Verify Razorpay Payment
      description: |
        Called by the frontend after Checkout.js fires `payment.success`.
        Verifies HMAC-SHA256 signature, creates Payment Entry, returns redirect URL.
      operationId: razorpay_verify_payment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RazorpayVerifyRequest"
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/RazorpayVerifyResponse"

  /api/method/payments.payment_gateways.doctype.razorpay_settings.razorpay_settings.check_payment_status:
    get:
      tags: [Razorpay]
      summary: Check Razorpay Payment Status
      description: Poll the current status of a Razorpay payment by Integration Request name.
      operationId: razorpay_check_payment_status
      security: []
      parameters:
        - name: integration_request_name
          in: query
          required: true
          schema:
            type: string
          example: "INT-00123"
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/PaymentStatusResponse"

  /api/method/payments.payment_gateways.doctype.razorpay_settings.razorpay_settings.refund_status:
    post:
      tags: [Razorpay]
      summary: Razorpay Refund Webhook
      description: |
        Server-to-server webhook endpoint for Razorpay refund events.
        Configure in Razorpay Dashboard → Settings → Webhooks.
        Verifies `X-Razorpay-Signature` and calls `on_refund_status_update`.
      operationId: razorpay_refund_status
      security: []
      parameters:
        - name: X-Razorpay-Signature
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  enum: [refund.created, refund.processed, refund.failed]
                payload:
                  type: object
      responses:
        "200":
          description: Webhook acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      refund_id:
                        type: string
                      status:
                        type: string

# -----------------------------------------------------------------------
# PATHS – CCAVENUE
# -----------------------------------------------------------------------

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.initiate_payment:
    post:
      tags: [CCAvenue]
      summary: Initiate CCAvenue Payment
      description: |
        Creates an AES-128-CBC encrypted payment payload for CCAvenue.
        The frontend must POST `encrypted_data` + `access_code` to the CCAvenue
        payment API URL or embed it in an iframe.

        Payment Charges are applied server-side.
      operationId: ccavenue_initiate_payment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "200":
          description: Encrypted payment payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/CCAvenueInitiateResponse"

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.check_payment_status:
    get:
      tags: [CCAvenue]
      summary: Check CCAvenue Payment Status
      operationId: ccavenue_check_payment_status
      security: []
      parameters:
        - name: integration_request_name
          in: query
          required: true
          schema:
            type: string
          example: "INT-00123"
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/PaymentStatusResponse"

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.verify_transaction:
    post:
      tags: [CCAvenue]
      summary: CCAvenue Browser Redirect (verify_transaction)
      description: |
        Primary browser redirect from CCAvenue after payment. Decrypts `encResp`,
        updates Integration Request, creates Payment Entry, restores user session.

        Configure as `redirect_url` / surl in CCAvenue dashboard.
        Use `?merchant={name}` to select the correct encryption key.
      operationId: ccavenue_verify_transaction
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
          description: CCAvenue Merchant record name
          example: "Hostel-Koramangala"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [encResp]
              properties:
                encResp:
                  type: string
                  description: AES-encrypted response from CCAvenue
      responses:
        "302":
          description: Redirect to redirect_to URL after processing

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.order_status_echo:
    post:
      tags: [CCAvenue]
      summary: CCAvenue S2S Backup Webhook (order_status_echo)
      description: |
        Server-to-server backup notification from CCAvenue. Duplicate-safe —
        skips processing if Integration Request is already Completed or Authorized.

        Configure as `notify_url` in CCAvenue dashboard.
      operationId: ccavenue_order_status_echo
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [encResp]
              properties:
                encResp:
                  type: string
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      status:
                        type: string
                      tracking_id:
                        type: string
                      order_status:
                        type: string
                      integration_request:
                        type: string

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.reconciliation_status:
    post:
      tags: [CCAvenue]
      summary: CCAvenue Reconciliation Webhook
      description: Handles delayed payment confirmations (UPI, wallet reconciliation).
      operationId: ccavenue_reconciliation_status
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [encResp]
              properties:
                encResp:
                  type: string
      responses:
        "200":
          description: Reconciliation processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      previous_status:
                        type: string
                      new_status:
                        type: string
                      order_status:
                        type: string
                      tracking_id:
                        type: string

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.refund_status:
    post:
      tags: [CCAvenue]
      summary: CCAvenue Refund Webhook
      description: |
        Handles CCAvenue refund status callbacks.
        Calls `on_refund_status_update` on the reference document.
      operationId: ccavenue_refund_status
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [encResp]
              properties:
                encResp:
                  type: string
      responses:
        "200":
          description: Refund status processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      order_id:
                        type: string
                      refund_id:
                        type: string
                      refund_status:
                        type: string
                      refund_amount:
                        type: number

  /api/method/payments.payment_gateways.doctype.ccavenue_settings.ccavenue_settings.restore_user_session:
    get:
      tags: [CCAvenue]
      summary: Restore User Session
      description: Restores the Frappe user session after a Guest CCAvenue callback.
      operationId: ccavenue_restore_user_session
      security: []
      responses:
        "200":
          description: Session restoration result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      user:
                        type: string

# -----------------------------------------------------------------------
# PATHS – EASEBUZZ
# -----------------------------------------------------------------------

  /api/method/payments.payment_gateways.doctype.easebuzz_settings.easebuzz_settings.initiate_payment:
    post:
      tags: [Easebuzz]
      summary: Initiate Easebuzz Payment
      description: |
        Creates an Easebuzz payment link via the Easebuzz initiateLink API.
        Returns `payment_url` for the frontend to redirect the user to.

        Payment Charges are applied server-side.
      operationId: easebuzz_initiate_payment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "200":
          description: Payment link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/EasebuzzInitiateResponse"

  /api/method/payments.payment_gateways.doctype.easebuzz_settings.easebuzz_settings.check_payment_status:
    get:
      tags: [Easebuzz]
      summary: Check Easebuzz Payment Status
      operationId: easebuzz_check_payment_status
      security: []
      parameters:
        - name: integration_request_name
          in: query
          required: true
          schema:
            type: string
          example: "INT-00123"
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/PaymentStatusResponse"

  /api/method/payments.payment_gateways.doctype.easebuzz_settings.easebuzz_settings.verify_transaction:
    post:
      tags: [Easebuzz]
      summary: Easebuzz Browser Redirect (verify_transaction)
      description: |
        Browser surl/furl redirect from Easebuzz. Verifies SHA-512 hash, creates
        Payment Entry, restores session.

        Add `?return_json=1` to receive a JSON response instead of an HTTP redirect
        (useful for mobile apps and React Native).
      operationId: easebuzz_verify_transaction
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
          example: "Hostel-Koramangala"
        - name: return_json
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
          description: "1 = return JSON instead of redirect"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/EasebuzzWebhookPayload"
      responses:
        "302":
          description: Redirect to redirect_to URL (when return_json=0)
        "200":
          description: JSON result (when return_json=1)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/EasebuzzWebhookResponse"

  /api/method/payments.payment_gateways.doctype.easebuzz_settings.easebuzz_settings.webhook_callback:
    post:
      tags: [Easebuzz]
      summary: Easebuzz S2S JSON Webhook
      description: |
        Server-to-server JSON webhook from Easebuzz. Duplicate-safe.
        Configure as webhook URL in Easebuzz Dashboard → API Details.
      operationId: easebuzz_webhook_callback
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EasebuzzWebhookPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/EasebuzzWebhookResponse"

  /api/method/payments.payment_gateways.doctype.easebuzz_settings.easebuzz_settings.refund_status:
    post:
      tags: [Easebuzz]
      summary: Easebuzz Refund Webhook
      description: Handles Easebuzz refund status webhooks. Calls `on_refund_status_update` on the reference document.
      operationId: easebuzz_refund_status
      security: []
      parameters:
        - name: merchant
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                txnid:
                  type: string
                refund_id:
                  type: string
                refund_status:
                  type: string
                refund_amount:
                  type: string
                udf5:
                  type: string
                  description: merchant_name
      responses:
        "200":
          description: Refund processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      txnid:
                        type: string
                      refund_id:
                        type: string
                      refund_status:
                        type: string
                      refund_amount:
                        type: string

# -----------------------------------------------------------------------
# PATHS – CASHFREE
# -----------------------------------------------------------------------

  /api/method/payments.payment_gateways.doctype.cashfree_settings.cashfree_settings.test_cashfree_connection:
    post:
      tags: [Cashfree]
      summary: Test Cashfree Connection
      description: Validates Cashfree credentials for a given Settings record. Requires System Manager auth.
      operationId: cashfree_test_connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings_name]
              properties:
                settings_name:
                  type: string
                  description: Cashfree Settings `gateway_name`
                  example: "Hostel-Koramangala"
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                        example: "Connection successful"

  /api/method/payments.payment_gateways.doctype.cashfree_settings.cashfree_settings.create_test_payment_link:
    post:
      tags: [Cashfree]
      summary: Create Cashfree Test Payment Link
      description: Creates a test Cashfree payment link. Requires System Manager auth.
      operationId: cashfree_create_test_payment_link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings_name, amount, customer_email, customer_name, customer_phone, description]
              properties:
                settings_name:
                  type: string
                  example: "Hostel-Koramangala"
                amount:
                  type: number
                  example: 500
                customer_email:
                  type: string
                  format: email
                customer_name:
                  type: string
                customer_phone:
                  type: string
                  example: "9876543210"
                description:
                  type: string
      responses:
        "200":
          description: Payment link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      cf_link_id:
                        type: string
                      link_id:
                        type: string
                      link_url:
                        type: string
                      link_status:
                        type: string
                        enum: [ACTIVE, PAID, EXPIRED]

  /api/method/payments.payment_gateways.doctype.cashfree_settings.cashfree_settings.cashfree_webhook:
    post:
      tags: [Cashfree]
      summary: Cashfree Webhook
      description: |
        Receives Cashfree payment event webhooks.

        **Signature verification:** The handler verifies `X-Webhook-Signature`
        (HMAC-SHA256 of `timestamp + payload` with `client_secret`) and `X-Webhook-Timestamp`.

        The correct Cashfree Settings record is resolved by:
        `order_id → Integration Request → company → get_cashfree_settings_by_company(company)`
      operationId: cashfree_webhook
      security: []
      parameters:
        - name: x-webhook-signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256(timestamp + "." + raw_body, client_secret)
        - name: x-webhook-timestamp
          in: header
          required: true
          schema:
            type: string
          description: Unix timestamp of the request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashfreeWebhookPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [success, error]
                      message:
                        type: string

  /api/method/payments.templates.pages.cashfree_checkout.make_payment:
    post:
      tags: [Cashfree]
      summary: Cashfree Make Payment (checkout page)
      description: |
        Called by the Cashfree checkout page JS after the Cashfree SDK reports payment.
        Fetches order status from Cashfree API, authorizes payment, returns redirect URL.
      operationId: cashfree_make_payment
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, payment_session_id, reference_doctype, reference_docname, token]
              properties:
                order_id:
                  type: string
                payment_session_id:
                  type: string
                reference_doctype:
                  type: string
                reference_docname:
                  type: string
                token:
                  type: string
                  description: Integration Request name
      responses:
        "200":
          description: Payment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      redirect_to:
                        type: string
                      status:
                        type: string
                        enum: [Success, Failed]

