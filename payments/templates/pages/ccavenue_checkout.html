<!-- DEPRECATED: This web-based checkout is deprecated.
     Use API-based integration with WebView for mobile apps.
     See CCAVENUE_API_INTEGRATION.md for implementation guide. -->

{% block script %}
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function(){
            window.addEventListener('message', function(e) {
                $("#paymentFrame").css("height", e.data['newHeight'] + 'px');
                console.log(e);
            }, false);
        });
    </script>
{% endblock %}

{%- block page_content -%}
    {% if same_window %}
    {# Full-window redirect: CCAvenue often blocks iframes (X-Frame-Options). Use ?same_window=1 when opening in a new tab. #}
    <form id="ccavenueRedirectForm" method="get" action="{{ api_url }}" target="_self">
        <input type="hidden" name="merchant_id" value="{{ payment_data.merchant_id }}" />
        <input type="hidden" name="encRequest" value="{{ payment_data.encRequest }}" />
        <input type="hidden" name="access_code" value="{{ payment_data.access_code }}" />
    </form>
    <script>document.getElementById("ccavenueRedirectForm").submit();</script>
    <p class="text-muted">{{ _("Redirecting to payment gateway…") }}</p>
    {% else %}
    <iframe id="paymentFrame" height="100%" width="100%" src="{{ api_url }}&merchant_id={{ payment_data.merchant_id }}&encRequest={{ payment_data.encRequest }}&access_code={{ payment_data.access_code }}">
    </iframe>
    {% endif %}
{% endblock %}
